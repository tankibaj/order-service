name: Generate API Specs

on:
  push:
    branches: [main]
    paths: [src/**, pyproject.toml]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql+asyncpg://dummy:dummy@localhost/dummy"
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - run: uv sync --frozen

      - run: uv run python scripts/generate_specs.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/api/ docs/schema/
          if git diff --cached --quiet; then
            echo "No spec changes detected"
          else
            git commit -m "chore: regenerate API specs [skip ci]"
            git push
          fi
